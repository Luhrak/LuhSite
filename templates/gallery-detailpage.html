{% extends "./layoutBlocks/layout.html" %} 

{% block title %}Luhraks Gallery - Raimond{% endblock %} 

{% block content %}

    <main>
      <div class="widthConstraint">
        <section class="detailsPage">
          <img
            src="{{ art.artfile }}"
            alt="{{ art.alt }}"
          />
          <div class="headingWithButtons">
          <h1>{{ art.title }}</h1>
          <a class="button" href="">Edit</a>

          <form type="hidden" class="hiddenForm" method="POST" action="/gallery-delete/{{ art.id }}">
            <button class="redBg" type="submit">Delete</button>
          </form>
          </div>
          <p>
            {{ art.description }}
          </p>
          <p>Want an art piece similar to this too?</p>
          <a class="button" href="/prices">Commission Art</a>
        </section>
      </div>
    </main>

{% endblock %}
